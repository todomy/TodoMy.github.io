<!-- 版权信息区域 -->
<div id="footer1">
    <!-- 显示当前年份和博客标题 -->
    Copyright © <span id="copyrightYear"></span> <a href="{{ blogBase['homeUrl'] }}">{{ blogBase['title'] }}</a>
</div>

<!-- 备案信息和运行天数区域 -->
<div id="footer2">
    <!-- 条件判断：如果备案号不为空，则显示备案号 -->
    {%- if blogBase['filingNum']!='' -%}
    <span id="filingNum">
        <!-- 备案号链接到ICP备案管理系统 -->
        <a href="https://beian.miit.gov.cn/" target="_blank">{{ blogBase['filingNum'] }}</a> • 
    </span>
    {%- endif %}
    <!-- 显示网站运行天数 -->
    <span id="runday"></span>
</div>

<!-- JavaScript脚本：动态更新版权年份和运行天数 -->
<script>
    // 获取当前日期
    var now = new Date();
    // 动态设置版权年份为当前年份
    document.getElementById("copyrightYear").innerHTML = now.getFullYear();

    // 如果定义了网站开始运行的日期
    if ("{{ blogBase['startSite'] }}" != "") {
        // 将字符串日期转换为Date对象
        var startSite = new Date("{{ blogBase['startSite'] }}");
        // 计算当前日期与开始日期的时间差（毫秒）
        var diff = now.getTime() - startSite.getTime();
        // 将时间差转换为天数
        var diffDay = Math.floor(diff / (1000 * 60 * 60 * 24));
        // 动态显示网站运行天数
        document.getElementById("runday").innerHTML = "{{ i18n['run'] }}" + diffDay + "{{ i18n['days'] }}" + " • ";
    }
</script>
