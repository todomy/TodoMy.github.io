<div id="footer1">Copyright © <span id="copyrightYear"></span> <a href="{{ blogBase['homeUrl'] }}">{{ blogBase['title'] }}</a></div>
<div id="footer2">
    {%- if blogBase['filingNum']!='' -%}
    <span id="filingNum"><a href="https://beian.miit.gov.cn/" target="_blank">{{ blogBase['filingNum'] }}</a> • </span>
    {%- endif %}
    <span id="runday"></span><span>Powered by <a href="https://meekdai.com/Gmeek.html" target="_blank">Gmeek</a></span>
</div>

<!-- 添加返回顶部按钮 -->
<div class="circle-button" onclick="scrollToTop()">↑</div>

<script>
var now = new Date();
document.getElementById("copyrightYear").innerHTML = now.getFullYear();

if ("{{ blogBase['startSite'] }}" != "") {
    var startSite = new Date("{{ blogBase['startSite'] }}");
    var diff = now.getTime() - startSite.getTime();
    var diffDay = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("runday").innerHTML = "{{ i18n['run'] }}" + diffDay + "{{ i18n['days'] }}" + " • ";
}

// 返回顶部功能
function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

// 链接点击变色功能
document.addEventListener('DOMContentLoaded', function() {
    const links = document.querySelectorAll('a');
    links.forEach(link => {
        link.addEventListener('click', function() {
            links.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
        });
    });
});
</script>

<style>
/* 添加返回顶部按钮的样式 */
.circle-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background-color: #007bff;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    transition: background-color 0.3s ease; /* 添加过渡效果 */
}

.circle-button:hover {
    background-color: #0056b3;
}

/* 链接样式 */
a {
    text-decoration: none;
    color: #007bff;
    transition: color 0.3s ease; /* 添加过渡效果 */
}

a:hover {
    color: #0056b3;
}

a.active {
    color: #ff0000; /* 已点击的链接变红 */
    font-weight: bold;
}

/* 文章内容样式 */
.article-content {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: background-color 0.3s ease; /* 添加过渡效果 */
}

.article-content:hover {
    background-color: #f5f5f5;
}

/* 文章列表样式 */
.article-list {
    margin-top: 20px;
}
</style>
